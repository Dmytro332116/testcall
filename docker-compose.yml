version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────
  # ASTERISK PBX — обробка SIP/телефонії
  # ─────────────────────────────────────────────────────────────
  asterisk:
    image: andrius/asterisk
    container_name: asterisk-pbx
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10099:10000-10099/udp"
    volumes:
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/manager.conf:/etc/asterisk/manager.conf:ro
    environment:
      - TZ=Europe/Kyiv
    depends_on:
      - ai-agent

  # ─────────────────────────────────────────────────────────────
  # AI AGENT — Node.js AudioSocket сервер
  # ─────────────────────────────────────────────────────────────
  ai-agent:
    build: .
    container_name: ai-voice-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9093:9093"
    env_file: .env
    environment:
      - NODE_ENV=production
      - AUDIOSOCKET_PORT=9093
      - AUDIOSOCKET_HOST=0.0.0.0
      - HTTP_API=true
      - API_PORT=3000
      - AMI_ENABLED=true
      - ASTERISK_HOST=asterisk-pbx
      - AMI_PORT=5038
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

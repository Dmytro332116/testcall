[general]
type=global
user_agent=AI-Voice-Agent/3.0

; ─────────────────────────────────────────────────────────────────────────────
; TRANSPORT — WebSocket (WSS) або UDP
; ─────────────────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; ─────────────────────────────────────────────────────────────────────────────
; SIP TRUNK — підключення до вашого SIP провайдера (62.149.25.79)
; ─────────────────────────────────────────────────────────────────────────────
[trunk-provider]
type=registration
transport=transport-udp
outbound_auth=trunk-provider-auth
server_uri=sip:62.149.25.79:5168
client_uri=sip:422@62.149.25.79:5168
retry_interval=60

[trunk-provider-auth]
type=auth
auth_type=userpass
username=422
password=T6ecK2zjH8xI

[trunk-provider-aor]
type=aor
contact=sip:62.149.25.79:5168

[trunk-provider-identify]
type=identify
endpoint=trunk-provider-endpoint
match=62.149.25.79

[trunk-provider-endpoint]
type=endpoint
transport=transport-udp
context=from-external
disallow=all
allow=ulaw
allow=alaw
allow=gsm
outbound_auth=trunk-provider-auth
aors=trunk-provider-aor

; ─────────────────────────────────────────────────────────────────────────────
; AMI USER — для Node.js підключення (вихідні дзвінки)
; Додати до /etc/asterisk/manager.conf
; ─────────────────────────────────────────────────────────────────────────────
; [admin]
; secret=admin_password
; deny=0.0.0.0/0.0.0.0
; permit=127.0.0.1/255.255.255.0
; read=all
; write=all
; ─────────────────────────────────────────────────────────────────────────────

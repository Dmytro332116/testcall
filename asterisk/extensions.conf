; ─────────────────────────────────────────────────────────────────────────────
; extensions.conf — Asterisk Dialplan для AI Voice Agent
; Шлях: /etc/asterisk/extensions.conf
; ─────────────────────────────────────────────────────────────────────────────

[general]
static=yes
writeprotect=no

; ─────────────────────────────────────────────────────────────────────────────
; ВХІДНІ ДЗВІНКИ — коли хтось телефонує на ваш номер
; ─────────────────────────────────────────────────────────────────────────────
[from-external]

; Всі вхідні дзвінки → AI агент
exten => _X.,1,NoOp(Вхідний дзвінок від ${CALLERID(num)})
 same => n,Set(MY_UUID=${UUID()})
 same => n,Answer()
 same => n,Wait(1)
 same => n,AudioSocket(${MY_UUID},ai-voice-agent:9093)
 same => n,Hangup()

; Або конкретний внутрішній номер
exten => 422,1,NoOp(AI агент активовано)
 same => n,Set(MY_UUID=${UUID()})
 same => n,Answer()
 same => n,Wait(1)
 same => n,AudioSocket(${MY_UUID},ai-voice-agent:9093)
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────────────────────
; ВИХІДНІ ДЗВІНКИ — ініційовані через AMI Originate
; Asterisk телефонує клієнту, коли він відповідає — підключає AI
; ─────────────────────────────────────────────────────────────────────────────
[ai-agent]

exten => s,1,NoOp(Вихідний AI дзвінок до ${CALLERID(num)})
 same => n,Set(MY_UUID=${UUID()})
 same => n,Wait(1)
 same => n,AudioSocket(${MY_UUID},ai-voice-agent:9093)
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────────────────────
; КОНТЕКСТ ДЛЯ ВНУТРІШНІХ ПЕРЕВОДІВ (необов'язково)
; ─────────────────────────────────────────────────────────────────────────────
[internal]

; Оператор може перевести дзвінок на людину набравши *0
exten => *0,1,Transfer(PJSIP/operator)

; Набрати будь-який внутрішній номер
exten => _2XX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()
